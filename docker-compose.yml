services:
  # Frontend (public site) — groovethiopia.com
  frontend:
    image: ghcr.io/abrhamt/groovethiopia-frontend:latest
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: groovethiopia-frontend
    restart: unless-stopped
    profiles: [ "prod" ]
    expose:
      - "3000"
    env_file:
      - ./apps/frontend/.env
    depends_on:
      - backend

  # Backend (admin + API) — admin.groovethiopia.com
  backend:
    image: ghcr.io/abrhamt/groovethiopia-backend:latest
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: groovethiopia-backend
    restart: unless-stopped
    profiles: [ "prod" ]
    expose:
      - "3001"
    env_file:
      - ./apps/backend/.env

  # ------------------------------------------------------------------
  # Staging — preview environment served at groovethiopia.livejamgames.com
  # before the code is promoted to groovethiopia.com. Uses the same
  # container images (latest tag) but separate env, separate MySQL,
  # separate container names. Bring it up with:
  #   docker compose --profile staging up -d
  # ------------------------------------------------------------------
  staging-frontend:
    image: ghcr.io/abrhamt/groovethiopia-frontend:latest
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: groovethiopia-staging-frontend
    restart: unless-stopped
    profiles: [ "staging" ]
    expose:
      - "3000"
    env_file:
      - ./apps/frontend/.env.staging
    depends_on:
      - staging-backend

  staging-backend:
    image: ghcr.io/abrhamt/groovethiopia-backend:latest
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: groovethiopia-staging-backend
    restart: unless-stopped
    profiles: [ "staging" ]
    expose:
      - "3001"
    env_file:
      - ./apps/backend/.env.staging
    depends_on:
      - staging-mysql

  staging-mysql:
    image: mysql:8.0
    container_name: groovethiopia-staging-mysql
    restart: unless-stopped
    profiles: [ "staging" ]
    environment:
      MYSQL_ROOT_PASSWORD: staging
      MYSQL_DATABASE: groovethiopia_staging
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    expose:
      - "3306"
    volumes:
      - staging_mysql_data:/var/lib/mysql

  # Caddy reverse proxy — handles SSL + routing for BOTH prod and staging
  caddy:
    image: caddy:2-alpine
    container_name: groovethiopia-caddy
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # No `depends_on` here because the upstream services live behind
    # `prod` and `staging` profiles that may not all be active. Caddy
    # itself retries backends automatically when they come up.

    # Inngest dev server (only for local dev; in prod use Inngest Cloud)
    # inngest:
    #   image: inngest/inngest:latest
    #   container_name: inngest
    #   command: ["inngest", "dev", "-u", "http://backend:3001/api/inngest"]
    #   ports:
    #     - "8288:8288"

volumes:
  caddy_data:
  caddy_config:
  staging_mysql_data:
