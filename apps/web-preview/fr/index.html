      <script>
        const slidesData = ["assets/hero-home.jpg","assets/event-horizon.jpg","assets/event-shukshuta.jpg"];
        const heroSection = document.getElementById('heroSlideshow');
        if (heroSection) {
          const overlay = document.createElement('div');
          overlay.className = 'hero-overlay';
          heroSection.appendChild(overlay);

          const slideElements = slidesData.map((src, i) => {
            const slide = document.createElement('div');
            slide.className = `hero-slide${i === 0 ? ' active' : ''}`;
            slide.style.backgroundImage = `url('${src}')`;
            heroSection.insertBefore(slide, heroSection.firstChild);
            return slide;
          });

          let currentSlide = 0;
          setInterval(() => {
            slideElements[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slideElements.length;
            slideElements[currentSlide].classList.add('active');
          }, 6000);
        }
      </script>
